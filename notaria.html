<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Seguimiento de trámites — Catastro Municipal</title>
<style>
  :root {
    --guinda:        #6e1e2e;
    --guinda-oscuro: #521624;
    --dorado:        #b98a3c;
    --dorado-suave:  #e7d3ab;
    --crema:         #f7f4ef;
    --blanco:        #ffffff;
    --tinta:         #2b2420;
    --tinta-suave:   #6d635c;
    --linea:         #ddd3c8;
    --ok:            #2f7d4f;
    --ok-fondo:      #e2f0e8;
    --alerta:        #b03030;
    --alerta-fondo:  #f6e2e2;
    --radio:         10px;
    --sombra:        0 2px 6px rgba(43, 36, 32, .12);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    background: var(--crema);
    color: var(--tinta);
    min-height: 100vh;
  }
  header {
    background: var(--guinda);
    color: white;
    padding: 18px 16px;
    text-align: center;
  }
  header .logo {
    width: 42px; height: 42px;
    background: var(--dorado);
    color: var(--guinda-oscuro);
    border-radius: 50%;
    display: inline-flex;
    align-items: center; justify-content: center;
    font-weight: 800; font-size: 17px;
    margin-bottom: 6px;
  }
  header h1 { margin: 0; font-size: 16px; letter-spacing: .5px; }
  header p { margin: 4px 0 0; font-size: 12.5px; opacity: .9; }

  main {
    max-width: 640px;
    margin: 0 auto;
    padding: 20px 16px 40px;
  }

  .tarjeta {
    background: var(--blanco);
    border-radius: var(--radio);
    box-shadow: var(--sombra);
    padding: 20px;
    margin-bottom: 16px;
  }

  #resultado:empty { display: none; }

  .r-titulo { font-size: 12px; letter-spacing: 1.5px; color: var(--tinta-suave); text-transform: uppercase; }
  .r-titulo strong {
    display: block;
    font-size: 19px;
    letter-spacing: .2px;
    color: var(--guinda-oscuro);
    margin-top: 2px;
    text-transform: none;
  }
  .r-actualizado { font-size: 11.5px; color: var(--tinta-suave); margin: 4px 0 16px; }

  .grupo-gestor { margin-top: 18px; }
  .grupo-gestor:first-of-type { margin-top: 4px; }
  .grupo-gestor-nombre {
    font-weight: 700;
    font-size: 13.5px;
    color: var(--guinda);
    padding-bottom: 6px;
    border-bottom: 2px solid var(--dorado-suave);
    margin-bottom: 4px;
  }

  .tramite-fila {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 11px 0;
    border-top: 1px solid var(--linea);
  }
  .grupo-gestor .tramite-fila:first-of-type { border-top: none; }
  .tramite-info { flex: 1; min-width: 0; }
  .tramite-folio {
    font-family: Consolas, monospace;
    font-weight: 700;
    font-size: 13.5px;
    color: var(--guinda-oscuro);
  }
  .tramite-tipo { font-size: 12.5px; color: var(--tinta-suave); margin-top: 2px; }
  .badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .5px;
    text-transform: uppercase;
    padding: 3px 9px;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .badge-proceso { background: #f2e4e8; color: var(--guinda); }
  .badge-listo   { background: var(--dorado-suave); color: #7a5a1e; }

  .aviso-error, .aviso-noencontrado, .aviso-vacio {
    border-radius: var(--radio);
    padding: 16px;
    font-size: 14px;
    line-height: 1.5;
    color: var(--tinta-suave);
    background: var(--crema);
  }

  footer {
    text-align: center;
    font-size: 11.5px;
    color: var(--tinta-suave);
    padding: 0 16px 24px;
  }
</style>
</head>
<body>

<header>
  <div class="logo">CM</div>
  <h1>CATASTRO MUNICIPAL</h1>
  <p>Seguimiento de trámites de la Notaría</p>
</header>

<main>
  <div id="resultado"></div>
</main>

<footer>
  La información se actualiza cada vez que Catastro registra un movimiento en alguno de estos trámites.
  Este enlace es personal — no lo compartas. Este sitio no muestra nombres ni claves catastrales.
</footer>

<script>
(function () {
  var resultado = document.getElementById('resultado');

  var ETIQUETAS = {
    EN_PROCESO:    { texto: 'En proceso',        clase: 'badge-proceso' },
    LISTO_ENTREGA: { texto: 'Listo para entrega', clase: 'badge-listo' }
  };

  function tarjetaHtml(interior) {
    return '<div class="tarjeta">' + interior + '</div>';
  }

  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }

  function formatearFecha(iso) {
    try {
      return new Date(iso).toLocaleString('es-MX', { dateStyle: 'short', timeStyle: 'short' });
    } catch (e) { return iso; }
  }

  function filaHtml(t) {
    var et = ETIQUETAS[t.estatus] || ETIQUETAS.EN_PROCESO;
    return '<div class="tramite-fila">' +
      '<div class="tramite-info">' +
        '<div class="tramite-folio">' + esc(t.folio) + '</div>' +
        '<div class="tramite-tipo">' + esc(t.tipo) + '</div>' +
      '</div>' +
      '<span class="badge ' + et.clase + '">' + et.texto + '</span>' +
    '</div>';
  }

  function mostrarLista(datos) {
    var tramites = datos.tramites || [];
    if (!tramites.length) {
      resultado.innerHTML = tarjetaHtml(
        '<div class="r-titulo">Trámites pendientes<strong>Ninguno por ahora</strong></div>' +
        '<div class="aviso-vacio" style="margin-top:14px">No hay trámites en proceso o listos para entrega de ningún gestor en este momento.</div>'
      );
      return;
    }

    // Agrupar por gestor, preservando el orden de llegada (el más
    // antiguo primero, tal como lo manda FICAT).
    var porGestor = {};
    var ordenGestores = [];
    tramites.forEach(function (t) {
      var nombre = t.gestor || '(sin nombre)';
      if (!porGestor[nombre]) { porGestor[nombre] = []; ordenGestores.push(nombre); }
      porGestor[nombre].push(t);
    });

    var grupos = ordenGestores.map(function (nombre) {
      return '<div class="grupo-gestor">' +
        '<div class="grupo-gestor-nombre">' + esc(nombre) + ' · ' + porGestor[nombre].length + '</div>' +
        porGestor[nombre].map(filaHtml).join('') +
      '</div>';
    }).join('');

    resultado.innerHTML = tarjetaHtml(
      '<div class="r-titulo">Trámites pendientes<strong>' + tramites.length + ' en total</strong></div>' +
      '<div class="r-actualizado">Última actualización: ' + esc(datos.actualizado_en ? formatearFecha(datos.actualizado_en) : '—') + '</div>' +
      grupos
    );
  }

  function mostrarNoEncontrado() {
    resultado.innerHTML = tarjetaHtml(
      '<div class="aviso-noencontrado">Este enlace no es válido, o todavía no tiene información publicada. ' +
      'Verifica el QR/link que te entregó Catastro, o inténtalo de nuevo más tarde.</div>'
    );
  }

  function mostrarError() {
    resultado.innerHTML = tarjetaHtml(
      '<div class="aviso-error">No se pudo cargar la información en este momento. Intenta de nuevo más tarde.</div>'
    );
  }

  function mostrarSinToken() {
    resultado.innerHTML = tarjetaHtml(
      '<div class="aviso-noencontrado">Para ver los trámites, escanea el código QR que te entregó Catastro.</div>'
    );
  }

  function buscar(token) {
    resultado.innerHTML = tarjetaHtml('<p style="margin:0;color:var(--tinta-suave)">Buscando…</p>');
    fetch('https://bitacora.catastro-sat.com/api/notaria?token=' + encodeURIComponent(token) + '&t=' + Date.now())
      .then(function (r) {
        if (r.status === 404) { mostrarNoEncontrado(); return null; }
        if (!r.ok) throw new Error('http');
        return r.json();
      })
      .then(function (data) { if (data) mostrarLista(data); })
      .catch(mostrarError);
  }

  var params = new URLSearchParams(window.location.search);
  var token = (params.get('t') || '').trim();
  if (token) buscar(token); else mostrarSinToken();
})();
</script>

</body>
</html>
