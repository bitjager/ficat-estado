<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Consulta de trámite — Catastro Municipal</title>
<style>
  :root {
    --guinda:        #6e1e2e;
    --guinda-oscuro: #521624;
    --dorado:        #b98a3c;
    --dorado-suave:  #e7d3ab;
    --crema:         #f7f4ef;
    --blanco:        #ffffff;
    --tinta:         #2b2420;
    --tinta-suave:   #6d635c;
    --linea:         #ddd3c8;
    --ok:            #2f7d4f;
    --ok-fondo:      #e2f0e8;
    --alerta:        #b03030;
    --alerta-fondo:  #f6e2e2;
    --radio:         10px;
    --sombra:        0 2px 6px rgba(43, 36, 32, .12);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    background: var(--crema);
    color: var(--tinta);
    min-height: 100vh;
  }
  header {
    background: var(--guinda);
    color: white;
    padding: 18px 16px;
    text-align: center;
  }
  header .logo {
    width: 42px; height: 42px;
    background: var(--dorado);
    color: var(--guinda-oscuro);
    border-radius: 50%;
    display: inline-flex;
    align-items: center; justify-content: center;
    font-weight: 800; font-size: 17px;
    margin-bottom: 6px;
  }
  header h1 { margin: 0; font-size: 16px; letter-spacing: .5px; }
  header p { margin: 4px 0 0; font-size: 12.5px; opacity: .9; }

  main {
    max-width: 480px;
    margin: 0 auto;
    padding: 20px 16px 40px;
  }

  .tarjeta {
    background: var(--blanco);
    border-radius: var(--radio);
    box-shadow: var(--sombra);
    padding: 20px;
    margin-bottom: 16px;
  }

  #resultado:empty { display: none; }

  .r-folio { font-size: 12px; letter-spacing: 1.5px; color: var(--tinta-suave); text-transform: uppercase; }
  .r-folio strong {
    display: block;
    font-size: 22px;
    letter-spacing: 1px;
    color: var(--guinda-oscuro);
    font-family: Consolas, monospace;
    margin-top: 2px;
  }
  .r-actualizado { font-size: 11.5px; color: var(--tinta-suave); margin: 6px 0 16px; }

  .tramite-fila {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 0;
    border-top: 1px solid var(--linea);
  }
  .tramite-fila:first-of-type { border-top: none; }
  .tramite-num {
    width: 26px; height: 26px;
    border-radius: 50%;
    background: var(--crema);
    color: var(--tinta-suave);
    font-weight: 700; font-size: 12px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .tramite-info { flex: 1; }
  .tramite-estado {
    font-weight: 700;
    font-size: 13.5px;
  }
  .tramite-leyenda { font-size: 12px; color: var(--tinta-suave); margin-top: 2px; }
  .badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .5px;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: 20px;
    margin-bottom: 3px;
  }
  .badge-proceso   { background: #f2e4e8; color: var(--guinda); }
  .badge-listo     { background: var(--dorado-suave); color: #7a5a1e; }
  .badge-entregado { background: var(--ok-fondo); color: var(--ok); }

  .aviso-cancelada, .aviso-error, .aviso-noencontrado {
    border-radius: var(--radio);
    padding: 16px;
    font-size: 14px;
    line-height: 1.5;
  }
  .aviso-cancelada { background: var(--alerta-fondo); color: var(--alerta); font-weight: 600; }
  .aviso-error, .aviso-noencontrado { background: var(--crema); color: var(--tinta-suave); }

  .aviso-listo-general {
    background: var(--dorado-suave);
    color: #5c440f;
    border-radius: var(--radio);
    padding: 12px 14px;
    font-weight: 700;
    font-size: 13.5px;
    margin-top: 14px;
    text-align: center;
  }

  footer {
    text-align: center;
    font-size: 11.5px;
    color: var(--tinta-suave);
    padding: 0 16px 24px;
  }
</style>
</head>
<body>

<header>
  <div class="logo">CM</div>
  <h1>CATASTRO MUNICIPAL</h1>
  <p>Consulta el estado de tu trámite</p>
</header>

<main>
  <div id="resultado"></div>
</main>

<footer>
  La información se actualiza cada vez que Catastro registra un movimiento.
  Este sitio no requiere ni almacena datos personales.
</footer>

<script>
(function () {
  var resultado = document.getElementById('resultado');

  var ETIQUETAS = {
    EN_PROCESO:    { texto: 'En proceso de atención', clase: 'badge-proceso' },
    LISTO_ENTREGA: { texto: 'Listo para entrega',      clase: 'badge-listo' },
    ENTREGADO:     { texto: 'Entregado',                clase: 'badge-entregado' }
  };

  function tarjetaHtml(interior) {
    return '<div class="tarjeta">' + interior + '</div>';
  }

  function mostrarCancelada(folio) {
    resultado.innerHTML = tarjetaHtml(
      '<div class="r-folio">Folio<strong>' + folio + '</strong></div>' +
      '<div class="aviso-cancelada" style="margin-top:14px">' +
      'Esta ficha fue cancelada.<br>Presentarse en el Depto. de Catastro Municipal para más información.' +
      '</div>'
    );
  }

  function mostrarFicha(folio, datos, actualizado) {
    var filas = '';
    var hayListo = false;
    (datos.tramites || []).forEach(function (estado, i) {
      var et = ETIQUETAS[estado] || ETIQUETAS.EN_PROCESO;
      if (estado === 'LISTO_ENTREGA') hayListo = true;
      filas += '<div class="tramite-fila">' +
        '<div class="tramite-num">' + (i + 1) + '</div>' +
        '<div class="tramite-info">' +
          '<span class="badge ' + et.clase + '">' + et.texto + '</span>' +
        '</div>' +
      '</div>';
    });

    var avisoGeneral = hayListo
      ? '<div class="aviso-listo-general">Favor de pasar a Catastro Municipal a recoger su(s) trámite(s).</div>'
      : '';

    resultado.innerHTML = tarjetaHtml(
      '<div class="r-folio">Folio<strong>' + folio + '</strong></div>' +
      '<div class="r-actualizado">Última actualización: ' + (actualizado || '—') + '</div>' +
      filas +
      avisoGeneral
    );
  }

  function mostrarNoEncontrado(folio) {
    resultado.innerHTML = tarjetaHtml(
      '<div class="aviso-noencontrado">' +
      'El folio <strong>' + folio + '</strong> aún no está disponible en este momento. ' +
      'La información puede tardar unos minutos en publicarse — intenta de nuevo más tarde.' +
      '</div>'
    );
  }

  function mostrarError() {
    resultado.innerHTML = tarjetaHtml(
      '<div class="aviso-error">No se pudo cargar la información en este momento. Intenta de nuevo más tarde.</div>'
    );
  }

  function mostrarSinFolio() {
    resultado.innerHTML = tarjetaHtml(
      '<div class="aviso-noencontrado">Para consultar tu trámite, escanea el código QR de tu talón.</div>'
    );
  }

  function buscar(folioCrudo) {
    var folio = (folioCrudo || '').trim().toUpperCase();
    resultado.innerHTML = tarjetaHtml('<p style="margin:0;color:var(--tinta-suave)">Buscando…</p>');

    fetch('estado.json?t=' + Date.now())
      .then(function (r) { if (!r.ok) throw new Error('http'); return r.json(); })
      .then(function (data) {
        var ficha = (data.fichas || {})[folio];
        if (!ficha) { mostrarNoEncontrado(folio); return; }
        if (ficha.estatus === 'CANCELADA') { mostrarCancelada(folio); return; }
        mostrarFicha(folio, ficha, data.actualizado);
      })
      .catch(mostrarError);
  }

  var params = new URLSearchParams(window.location.search);
  var folioInicial = (params.get('f') || '').trim();
  if (folioInicial) buscar(folioInicial); else mostrarSinFolio();
})();
</script>

</body>
</html>
